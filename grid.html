<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Tonight's Grid — Paddock Premiere</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold:       #C9A84C;
      --gold-light: #E8C97A;
      --gold-dim:   #7A6228;
      --black:      #080808;
      --surface:    #101010;
      --surface-2:  #161616;
      --surface-3:  #222222;
      --border:     #2A2A2A;
      --text:       #F0ECE4;
      --text-muted: #777;
      --green:      #22C55E;
      --green-bg:   #0C1F11;
      --green-bdr:  #1A3D22;
      --font-serif: 'Cormorant Garamond', Georgia, serif;
      --font-sans:  'Outfit', system-ui, sans-serif;
    }

    html {
      background: var(--black);
      color: var(--text);
      font-family: var(--font-sans);
      -webkit-font-smoothing: antialiased;
    }

    body {
      min-height: 100dvh;
      max-width: 640px;
      margin: 0 auto;
      padding-bottom: 32px;
    }

    /* ─────────────────────────────── HEADER */
    .header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--black);
      border-bottom: 1px solid var(--border);
      padding: 16px 16px 0;
    }

    .header-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .header-eyebrow {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 3px;
    }

    .header-title {
      font-family: var(--font-serif);
      font-size: 24px;
      font-weight: 700;
      color: var(--text);
      line-height: 1;
    }

    /* Live pill */
    .live-pill {
      display: flex;
      align-items: center;
      gap: 5px;
      background: rgba(34,197,94,0.1);
      border: 1px solid var(--green-bdr);
      border-radius: 20px;
      padding: 5px 11px 5px 8px;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .live-dot {
      width: 7px; height: 7px;
      background: var(--green);
      border-radius: 50%;
      animation: pulse 2s ease infinite;
      flex-shrink: 0;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.5; transform: scale(0.85); }
    }

    .live-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--green);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    /* Stat bar */
    .stat-bar {
      display: flex;
      gap: 20px;
      margin-bottom: 12px;
    }

    .stat {
      display: flex;
      flex-direction: column;
      gap: 1px;
    }

    .stat-num {
      font-family: var(--font-serif);
      font-size: 22px;
      font-weight: 700;
      color: var(--gold);
      line-height: 1;
    }

    .stat-label {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .stat-divider {
      width: 1px;
      background: var(--border);
      align-self: stretch;
    }

    /* Progress bar */
    .progress-bar {
      height: 3px;
      background: var(--surface-3);
      margin: 0 -16px;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--green), #4ade80);
      transition: width 0.6s cubic-bezier(.4,0,.2,1);
    }

    /* ─────────────────────────────── SEARCH */
    .search-section { padding: 14px 16px 0; }

    .search-wrap { position: relative; }

    .search-icon {
      position: absolute;
      left: 13px; top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      pointer-events: none;
      display: flex;
    }

    .search-input {
      width: 100%;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: var(--font-sans);
      font-size: 15px;
      padding: 11px 40px 11px 40px;
      outline: none;
      transition: border-color 0.2s;
      -webkit-appearance: none;
    }

    .search-input:focus  { border-color: var(--gold-dim); }
    .search-input::placeholder { color: var(--text-muted); }

    .search-clear {
      position: absolute;
      right: 10px; top: 50%;
      transform: translateY(-50%);
      background: var(--surface-3);
      border: none;
      color: var(--text-muted);
      width: 22px; height: 22px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 11px;
      display: none;
      align-items: center;
      justify-content: center;
    }

    .search-clear.visible { display: flex; }

    /* ─────────────────────────────── TABS */
    .tabs-wrap {
      padding: 10px 16px 0;
      overflow-x: auto;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
    }

    .tabs-wrap::-webkit-scrollbar { display: none; }

    .tabs {
      display: flex;
      gap: 6px;
      padding-bottom: 10px;
      width: max-content;
    }

    .tab {
      padding: 6px 14px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      font-family: var(--font-sans);
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: all 0.18s;
      white-space: nowrap;
      -webkit-tap-highlight-color: transparent;
    }

    .tab:hover { border-color: var(--gold-dim); color: var(--text); }

    .tab.active {
      background: var(--gold);
      border-color: var(--gold);
      color: var(--black);
      font-weight: 700;
    }

    /* ─────────────────────────────── STATUS FILTER */
    .status-row {
      display: flex;
      gap: 8px;
      padding: 0 16px 10px;
    }

    .status-chip {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 5px 12px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      font-family: var(--font-sans);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.18s;
      -webkit-tap-highlight-color: transparent;
    }

    .status-chip.active-all {
      background: var(--surface-3);
      border-color: var(--surface-3);
      color: var(--text);
    }

    .status-chip.active-on {
      background: rgba(34,197,94,0.1);
      border-color: var(--green-bdr);
      color: var(--green);
    }

    .status-chip.active-off {
      background: var(--surface-2);
      border-color: var(--border);
      color: var(--text-muted);
    }

    .chip-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .chip-dot-green  { background: var(--green); }
    .chip-dot-muted  { background: var(--text-muted); }

    /* ─────────────────────────────── META ROW */
    .meta-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px 6px;
    }

    .meta-count { font-size: 12px; color: var(--text-muted); }

    .refresh-btn {
      background: transparent;
      border: none;
      color: var(--text-muted);
      font-family: var(--font-sans);
      font-size: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 4px 0;
      -webkit-tap-highlight-color: transparent;
    }

    .refresh-btn:hover { color: var(--text); }

    .refresh-icon {
      display: inline-block;
      transition: transform 0.4s;
    }

    .refresh-icon.spinning { transform: rotate(360deg); }

    /* ─────────────────────────────── CAR CARDS */
    .cards-grid {
      padding: 0 12px;
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
    }

    @media (min-width: 480px) {
      .cards-grid { grid-template-columns: 1fr 1fr; padding: 0 16px; gap: 10px; }
    }

    .car-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 13px 14px 12px;
      position: relative;
      overflow: hidden;
      transition: border-color 0.25s, background 0.25s;
    }

    /* Left-edge accent */
    .car-card::after {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      background: var(--border);
      transition: background 0.25s;
    }

    .car-card.on-grid {
      background: var(--green-bg);
      border-color: var(--green-bdr);
    }

    .car-card.on-grid::after { background: var(--green); }

    .card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 7px;
    }

    /* Category badge */
    .cat-badge {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.13em;
      text-transform: uppercase;
      padding: 3px 8px;
      border-radius: 4px;
    }

    .badge-instagram { background: rgba(201,168,76,0.13); color: #D4A84B; }
    .badge-jdm       { background: rgba(239,68,68,0.12);  color: #FC8181; }
    .badge-euro      { background: rgba(96,165,250,0.12); color: #60A5FA; }
    .badge-domestic  { background: rgba(156,163,175,0.1); color: #9CA3AF; }
    .badge-moto      { background: rgba(167,139,250,0.12);color: #A78BFA; }
    .badge-classic   { background: rgba(52,211,153,0.12); color: #34D399; }

    /* On-grid pill */
    .on-grid-pill {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 10px;
      font-weight: 700;
      color: var(--green);
      letter-spacing: 0.06em;
      flex-shrink: 0;
    }

    .on-grid-pill svg { width: 12px; height: 12px; }

    /* Expected pill */
    .expected-pill {
      font-size: 10px;
      font-weight: 500;
      color: var(--text-muted);
      letter-spacing: 0.04em;
    }

    .card-car {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      line-height: 1.3;
      margin-bottom: 3px;
    }

    .card-handle {
      font-size: 13px;
      color: var(--gold);
    }
    .handle-link {
      color: inherit;
      text-decoration: none;
    }
    .handle-link:hover {
      text-decoration: underline;
      opacity: 0.8;
    }

    .card-time {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 8px;
    }

    /* ─────────────────────────────── EMPTY */
    .empty-state {
      grid-column: 1 / -1;
      padding: 52px 20px;
      text-align: center;
    }

    .empty-icon { font-size: 36px; margin-bottom: 14px; }
    .empty-h    { font-size: 18px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
    .empty-p    { font-size: 14px; color: var(--text-muted); line-height: 1.5; }

    /* ─────────────────────────────── FOOTER */
    .grid-footer {
      padding: 24px 16px 0;
      text-align: center;
    }

    .footer-note {
      font-size: 12px;
      color: var(--text-muted);
      line-height: 1.6;
      margin-bottom: 16px;
    }

    .btn-vote {
      display: inline-block;
      background: var(--gold);
      color: #0a0800;
      font-family: var(--font-sans);
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.06em;
      padding: 13px 28px;
      border-radius: 10px;
      text-decoration: none;
      cursor: pointer;
      border: none;
      -webkit-tap-highlight-color: transparent;
    }
  </style>
</head>
<body>

<!-- ── HEADER ────────────────────────────────────────── -->
<header class="header">
  <div class="header-row">
    <div>
      <div class="header-eyebrow">Paddock Premiere · March 22</div>
      <div class="header-title">Tonight's Grid</div>
    </div>
    <div class="live-pill">
      <div class="live-dot"></div>
      <span class="live-label">Live</span>
    </div>
  </div>

  <div class="stat-bar">
    <div class="stat">
      <div class="stat-num" id="statOnGrid">0</div>
      <div class="stat-label">On Grid</div>
    </div>
    <div class="stat-divider"></div>
    <div class="stat">
      <div class="stat-num" id="statExpected">38</div>
      <div class="stat-label">Expected</div>
    </div>
    <div class="stat-divider"></div>
    <div class="stat">
      <div class="stat-num" id="statTotal">38</div>
      <div class="stat-label">Registered</div>
    </div>
  </div>

  <div class="progress-bar">
    <div class="progress-fill" id="progressFill" style="width:0%"></div>
  </div>
</header>

<!-- ── SEARCH ─────────────────────────────────────────── -->
<div class="search-section">
  <div class="search-wrap">
    <span class="search-icon">
      <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
    </span>
    <input
      id="searchInput"
      class="search-input"
      type="search"
      placeholder="Search car or @handle…"
      autocomplete="off"
      autocorrect="off"
      spellcheck="false"
    >
    <button class="search-clear" id="searchClear" aria-label="Clear">✕</button>
  </div>
</div>

<!-- ── CATEGORY TABS ──────────────────────────────────── -->
<div class="tabs-wrap">
  <div class="tabs" id="tabsRow">
    <button class="tab active" data-cat="all">All</button>
    <button class="tab" data-cat="instagram">Confirmed</button>
    <button class="tab" data-cat="jdm">JDM</button>
    <button class="tab" data-cat="euro">Euro</button>
    <button class="tab" data-cat="domestic">Domestic</button>
    <button class="tab" data-cat="moto">Moto</button>
    <button class="tab" data-cat="classic">Classic</button>
  </div>
</div>

<!-- ── STATUS FILTER ──────────────────────────────────── -->
<div class="status-row">
  <button class="status-chip active-all" data-status="all">All</button>
  <button class="status-chip" data-status="on">
    <span class="chip-dot chip-dot-green"></span>On Grid
  </button>
  <button class="status-chip" data-status="off">
    <span class="chip-dot chip-dot-muted"></span>Expected
  </button>
</div>

<!-- ── META ───────────────────────────────────────────── -->
<div class="meta-row">
  <span class="meta-count" id="metaCount"></span>
  <button class="refresh-btn" id="refreshBtn">
    <span class="refresh-icon" id="refreshIcon">↻</span> Refresh
  </button>
</div>

<!-- ── CARDS ──────────────────────────────────────────── -->
<main class="cards-grid" id="cardsGrid"></main>

<!-- ── FOOTER CTA ─────────────────────────────────────── -->
<div class="grid-footer">
  <div class="footer-note">
    See a build you love?<br>Cast your People's Choice vote.
  </div>
  <a href="vote.html" class="btn-vote">Vote Now →</a>
</div>

<script>
// ═══════════════════════════════════════════════════════
// CARS — same master list as checkin.html + vote.html
// ═══════════════════════════════════════════════════════
const BASE_CARS = [
  { id:  1, car: "Chevrolet Corvette",           handle: "@sounddarde",           category: "instagram" },
  { id:  2, car: "BMW M4",                       handle: "@kevindegroot7777",     category: "instagram" },
  { id:  3, car: "Ferrari 458 Italia",           handle: "@chrischavarro",        category: "instagram" },
  { id:  4, car: "BMW M4",                       handle: "@aaronjoelgeorge",      category: "instagram" },
  { id:  5, car: "Mercedes-Benz GLC63 AMG",      handle: "@gyat.amg",             category: "instagram" },
  { id:  6, car: "Nissan GT-R R35 (Purple)",     handle: "@gcg_habits",           category: "instagram" },
  { id:  7, car: "Ford Mustang S650",            handle: "@mako_s650",            category: "instagram" },
  { id:  8, car: "Ford Mustang S650",            handle: "@thatblackwidows650",   category: "instagram" },
  { id:  9, car: "Honda Civic FK8 Type R LE",   handle: "@type_raichu",          category: "instagram" },
  { id: 10, car: "Mercedes-Benz AMG",            handle: "@dgb1031",              category: "instagram" },
  { id: 11, car: "Chevrolet Camaro (Modded)",    handle: "@ss.pao.66",            category: "instagram" },
  { id: 12, car: "AMS Alpha GT-R R35",           handle: "@instabraad",           category: "instagram" },
  { id: 13, car: "Nissan GT-R R35",              handle: "@r35.aus",              category: "jdm" },
  { id: 14, car: "Toyota Supra MK4",             handle: "@supra_atx",            category: "jdm" },
  { id: 15, car: "Honda S2000",                  handle: "@s2k_tx",               category: "jdm" },
  { id: 16, car: "Mazda RX-7 FD",                handle: "@fd3s_atx",             category: "jdm" },
  { id: 17, car: "Mitsubishi Evo IX",            handle: "@evo9_atx",             category: "jdm" },
  { id: 18, car: "Subaru WRX STI",               handle: "@sti_austin",           category: "jdm" },
  { id: 19, car: "Honda Civic Type R FK8",       handle: "@fk8_atx",              category: "jdm" },
  { id: 20, car: "BMW M3 E46",                   handle: "@e46m3_atx",            category: "euro" },
  { id: 21, car: "Porsche 911 GT3",              handle: "@gt3_atx",              category: "euro" },
  { id: 22, car: "Mercedes-AMG C63",             handle: "@amgc63_tx",            category: "euro" },
  { id: 23, car: "Audi RS3",                     handle: "@rs3_austin",           category: "euro" },
  { id: 24, car: "VW Golf R",                    handle: "@golfr_atx",            category: "euro" },
  { id: 25, car: "Ford Focus RS",                handle: "@naegerter_rs",         category: "domestic" },
  { id: 26, car: "Dodge Challenger SRT Hellcat", handle: "@bagd717",              category: "domestic" },
  { id: 27, car: "Dodge Charger R/T",            handle: "@garza_5.7",            category: "domestic" },
  { id: 28, car: "Chevrolet Corvette C6",        handle: "@fulloppc5",            category: "domestic" },
  { id: 29, car: "Chevrolet Camaro 4th Gen",     handle: "@arii_soss",            category: "domestic" },
  { id: 30, car: "Chrysler 300 SRT",             handle: "@james.king300",        category: "domestic" },
  { id: 31, car: "BMW S1000RR",                  handle: "@s1kjoe",               category: "moto" },
  { id: 32, car: "Kawasaki ZX6R",                handle: "@meezzy.6r",            category: "moto" },
  { id: 33, car: "Honda CBR",                    handle: "@cbr_1krrr",            category: "moto" },
  { id: 34, car: "Legion Bike Club",             handle: "@legionbikeandcarclub",  category: "moto" },
  { id: 35, car: "VW Beetle '66",               handle: "@la_pulga_08",          category: "classic" },
  { id: 36, car: "VW Beetle (Red)",              handle: "@eli_mtzvolks",         category: "classic" },
  { id: 37, car: "Custom Truck",                 handle: "@maxxribble",           category: "classic" },
  { id: 38, car: "Lightning McQueen ⚡",         handle: "@kaitlyn_france95",     category: "classic" },
];

const CAT_LABELS = {
  instagram: "Confirmed", jdm: "JDM", euro: "Euro",
  domestic:  "Domestic",  moto: "Moto", classic: "Classic",
};

// ═══════════════════════════════════════════════════════
// READ CHECK-IN STATE
// Reads from the same localStorage key that checkin.html writes.
// On event day, staff run checkin.html on a shared/designated
// device — patrons on OTHER phones will see 0 arrived until
// this is wired to a real-time backend (Supabase recommended).
//
// TODO — SUPABASE REAL-TIME
// Replace getCheckins() with a Supabase subscription:
//
//   const { data } = await supabase.from('checkins').select('*')
//   supabase.channel('checkins').on('postgres_changes', ..., render)
//
// checkin.html would then write to that table instead of localStorage,
// and grid.html would stay in sync across all patron devices.
// ═══════════════════════════════════════════════════════
const LS_CHECKINS = "paddock_checkins_v1";
const LS_CUSTOM   = "paddock_custom_cars_v1";

function getCheckins() {
  try { return JSON.parse(localStorage.getItem(LS_CHECKINS) || "{}"); }
  catch { return {}; }
}

function getCustomCars() {
  try { return JSON.parse(localStorage.getItem(LS_CUSTOM) || "[]"); }
  catch { return []; }
}

function allCars() {
  return [...BASE_CARS, ...getCustomCars()];
}

// ═══════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════
let activeTab    = "all";
let activeStatus = "all";   // "all" | "on" | "off"
let searchQuery  = "";

// ═══════════════════════════════════════════════════════
// FILTER
// ═══════════════════════════════════════════════════════
function filtered(checkins) {
  const q = searchQuery.toLowerCase();
  return allCars().filter(c => {
    const isOn     = !!(checkins[c.id]?.on);
    const matchTab = activeTab === "all" || c.category === activeTab;
    const matchSts = activeStatus === "all"
      || (activeStatus === "on"  && isOn)
      || (activeStatus === "off" && !isOn);
    const matchQ   = !q || c.car.toLowerCase().includes(q) || c.handle.toLowerCase().includes(q);
    return matchTab && matchSts && matchQ;
  });
}

// ═══════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════
function render() {
  const checkins = getCheckins();
  const cars     = allCars();
  const total    = cars.length;
  const onCount  = Object.values(checkins).filter(v => v.on).length;
  const expected = total - onCount;

  // Header stats
  document.getElementById("statOnGrid").textContent  = onCount;
  document.getElementById("statExpected").textContent = expected;
  document.getElementById("statTotal").textContent    = total;
  document.getElementById("progressFill").style.width =
    total ? `${(onCount / total) * 100}%` : "0%";

  // Cards
  const list = filtered(checkins);
  document.getElementById("metaCount").textContent =
    list.length ? `${list.length} vehicle${list.length !== 1 ? "s" : ""}` : "";

  const grid = document.getElementById("cardsGrid");

  if (!list.length) {
    grid.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">🔍</div>
        <div class="empty-h">No vehicles found</div>
        <div class="empty-p">Try adjusting the search or filters.</div>
      </div>`;
    return;
  }

  // Sort: on-grid first, then alphabetical within each group
  const sorted = [...list].sort((a, b) => {
    const aOn = !!(checkins[a.id]?.on);
    const bOn = !!(checkins[b.id]?.on);
    if (aOn !== bOn) return aOn ? -1 : 1;
    return a.car.localeCompare(b.car);
  });

  grid.innerHTML = sorted.map(c => {
    const ci   = checkins[c.id];
    const isOn = !!(ci?.on);
    const time = ci?.time || "";

    return `
      <div class="car-card${isOn ? " on-grid" : ""}">
        <div class="card-header">
          <span class="cat-badge badge-${esc(c.category)}">${esc(CAT_LABELS[c.category] || c.category)}</span>
          ${isOn
            ? `<span class="on-grid-pill">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"
                     stroke-linecap="round" stroke-linejoin="round">
                  <polyline points="20 6 9 17 4 12"/>
                </svg>
                ON GRID
               </span>`
            : `<span class="expected-pill">Expected</span>`
          }
        </div>
        <div class="card-car">${esc(c.car)}</div>
        <div class="card-handle"><a href="https://www.instagram.com/${c.handle.slice(1)}/" target="_blank" rel="noopener" class="handle-link">${esc(c.handle)}</a></div>
        ${isOn ? `<div class="card-time">Arrived ${esc(time)}</div>` : ""}
      </div>`;
  }).join("");
}

// ═══════════════════════════════════════════════════════
// EVENTS — search
// ═══════════════════════════════════════════════════════
const searchInput = document.getElementById("searchInput");
const searchClear = document.getElementById("searchClear");

searchInput.addEventListener("input", () => {
  searchQuery = searchInput.value.trim();
  searchClear.classList.toggle("visible", searchQuery.length > 0);
  render();
});

searchClear.addEventListener("click", () => {
  searchInput.value = "";
  searchQuery = "";
  searchClear.classList.remove("visible");
  searchInput.focus();
  render();
});

// ═══════════════════════════════════════════════════════
// EVENTS — category tabs
// ═══════════════════════════════════════════════════════
document.getElementById("tabsRow").addEventListener("click", e => {
  const btn = e.target.closest("[data-cat]");
  if (!btn) return;
  activeTab = btn.dataset.cat;
  document.querySelectorAll(".tab").forEach(t =>
    t.classList.toggle("active", t.dataset.cat === activeTab)
  );
  render();
});

// ═══════════════════════════════════════════════════════
// EVENTS — status filter
// ═══════════════════════════════════════════════════════
document.querySelectorAll("[data-status]").forEach(chip => {
  chip.addEventListener("click", () => {
    activeStatus = chip.dataset.status;
    document.querySelectorAll("[data-status]").forEach(c => {
      c.classList.remove("active-all", "active-on", "active-off");
    });
    const cls = activeStatus === "all" ? "active-all"
              : activeStatus === "on"  ? "active-on" : "active-off";
    chip.classList.add(cls);
    render();
  });
});

// ═══════════════════════════════════════════════════════
// REFRESH BUTTON
// ═══════════════════════════════════════════════════════
document.getElementById("refreshBtn").addEventListener("click", () => {
  const icon = document.getElementById("refreshIcon");
  icon.classList.add("spinning");
  setTimeout(() => icon.classList.remove("spinning"), 420);
  render();
});

// ═══════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════
function esc(s) {
  return String(s ?? "")
    .replace(/&/g, "&amp;").replace(/</g, "&lt;")
    .replace(/>/g, "&gt;").replace(/"/g, "&quot;");
}

// ═══════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════
render();
</script>
</body>
</html>
